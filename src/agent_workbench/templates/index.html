<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Workbench</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; background:#0b0e14; color:#edf2f8 }
    * { box-sizing:border-box } body { margin:0; padding:2rem; background:radial-gradient(circle at top left,#18344a,transparent 38rem),#0b0e14 }
    main { width:min(70rem,100%); margin:auto } header { margin-bottom:2rem } h1 { font-size:clamp(2.5rem,7vw,5rem); margin:.4rem 0; letter-spacing:-.05em }
    .muted { color:#9eabba } .grid { display:grid; grid-template-columns:minmax(0,1.4fr) minmax(18rem,.8fr); gap:1.5rem }
    section { padding:1.5rem; border:1px solid #2b3747; border-radius:1.2rem; background:#111720e6 }
    label { display:block; margin-bottom:.5rem; font-weight:650 } textarea,input { width:100%; margin-bottom:1.2rem; padding:.9rem; color:inherit; background:#0b1018; border:1px solid #35445a; border-radius:.7rem }
    textarea { min-height:13rem; resize:vertical } button { padding:.85rem 1.2rem; border:0; border-radius:.7rem; background:#73daca; color:#07110f; font-weight:750; cursor:pointer }
    ol { padding-left:1.2rem } li { margin-bottom:1rem } a { color:#73daca } .status { color:#d2a6ff; font-size:.8rem; text-transform:uppercase }
    @media(max-width:760px){ .grid { grid-template-columns:1fr } body { padding:1rem } }
  </style>
</head>
<body>
<main>
  <header>
    <div class="status">Private · {{ environment }}</div>
    <h1>Agent Workbench</h1>
    <div class="muted">Signed in as {{ username }}</div>
  </header>
  <div class="grid">
    <section>
      <h2>New workspace</h2>
      <form action="/workspaces" method="post" enctype="multipart/form-data">
        <label for="title">Workspace title</label>
        <input id="title" name="title" maxlength="120" placeholder="Dataset exploration">
        <label for="prompt">What should the agent do?</label>
        <textarea id="prompt" name="prompt" maxlength="20000" required></textarea>
        <label for="mode">Mode</label>
        <select id="mode" name="mode">
          <option value="ask">Ask — answer a prompt; files optional</option>
          <option value="analyse">Analyse — investigate uploaded files</option>
          <option value="workflow">Workflow — use a reviewed file workflow</option>
        </select>
        <label for="workflow">Workflow <span class="muted">(Workflow mode only)</span></label>
        <select id="workflow" name="workflow">
          <option value="">Select a workflow</option>
          {% for workflow in workflows %}
          <option value="{{ workflow.id }}">{{ workflow.name }} — {{ workflow.description }}</option>
          {% endfor %}
        </select>
        <label for="files">Files <span class="muted">(optional)</span></label>
        <input id="files" name="files" type="file" accept=".csv,.json,.md,.pdf,.txt" multiple>
        <button type="submit">Create workspace</button>
      </form>
    </section>
    <section>
      <h2>Workspaces</h2>
      {% if workspaces %}
      <ol>
        {% for workspace in workspaces %}
        <li>
          <a href="/workspaces/{{ workspace.id }}">{{ workspace.title }}</a>
          <div class="status">{{ workspace.model }}</div>
        </li>
        {% endfor %}
      </ol>
      {% else %}
      <p class="muted">No active workspaces yet.</p>
      {% endif %}
    </section>
  </div>
</main>
</body>
</html>

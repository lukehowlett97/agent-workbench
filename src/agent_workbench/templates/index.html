<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agent Workbench</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: #0b0e14;
        color: #e8edf5;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
        background:
          radial-gradient(circle at top left, #18344a 0, transparent 34rem),
          #0b0e14;
      }

      main {
        width: min(46rem, 100%);
        padding: clamp(2rem, 6vw, 4rem);
        border: 1px solid #2a3444;
        border-radius: 1.5rem;
        background: rgb(17 22 31 / 88%);
        box-shadow: 0 2rem 6rem rgb(0 0 0 / 35%);
      }

      .eyebrow {
        color: #73daca;
        font-size: .75rem;
        font-weight: 700;
        letter-spacing: .12em;
        text-transform: uppercase;
      }

      h1 {
        margin: .75rem 0 1rem;
        font-size: clamp(2.2rem, 8vw, 4.5rem);
        line-height: .95;
        letter-spacing: -.05em;
      }

      p {
        max-width: 38rem;
        color: #aeb9c9;
        font-size: 1.05rem;
        line-height: 1.65;
      }

      .status {
        display: flex;
        gap: .75rem;
        align-items: center;
        margin-top: 2rem;
        padding: 1rem;
        border: 1px solid #293548;
        border-radius: .9rem;
        background: #0d121b;
      }

      .dot {
        width: .65rem;
        height: .65rem;
        border-radius: 50%;
        background: #73daca;
        box-shadow: 0 0 1rem #73daca;
      }

      code { color: #d2a6ff; }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Private workspace · {{ environment }}</div>
      <h1>Agent Workbench</h1>
      <p>
        Signed in as <strong>{{ username }}</strong>. The secure application
        shell is ready; prompt submission, uploads and job processing arrive
        in the next milestone.
      </p>
      <div class="status">
        <span class="dot" aria-hidden="true"></span>
        <span>Stage 1 application online</span>
      </div>
    </main>
  </body>
</html>
